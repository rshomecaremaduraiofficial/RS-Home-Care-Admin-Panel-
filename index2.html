<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mary Christa Attendance</title>

<style>
:root{
  --blue:#0b4f8a;
  --green:#10b21e;
  --bg:#f2f4f7;
}
body{
  margin:0;
  background:var(--bg);
  font-family:Arial,sans-serif;
}
.wrap{
  display:flex;
  justify-content:center;
  padding:20px;
}
.card{
  max-width:500px;
  width:100%;
}
.panel{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--blue);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
#msg{margin-top:10px;font-size:13px}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">
    <div class="panel">

      <h3>Mark Attendance</h3>
      <div id="istNow">IST: --:--</div>

      <input id="name" placeholder="Name">
      <input id="accessNo" placeholder="Access No">

      <select id="role">
        <option value="">Select role</option>
        <option>Admin</option>
        <option>Designer</option>
        <option>Supervisor</option>
      </select>

      <input id="phone" placeholder="Phone">

      <button class="btn" id="attendanceBtn">Mark Attendance</button>

      <div id="msg"></div>

    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxQ_mkDefSArjJwwMxDuKlckLcJK0Z6NpWCc0-PwGSDkQdIzL10XbZTFctAurFjjXQr/exec";

// ✅ LOCATION (25 meters)
const OFFICE_LAT = 9.95228;
const OFFICE_LNG = 78.10099;
const ALLOWED_RADIUS_METERS = 25;

// ✅ TIME (10:00 → 10:30 IST)
const START_MIN = 10 * 60;
const END_MIN   = 10 * 60 + 30;

// ---------- JSONP ----------
function jsonp(params){
  return new Promise((resolve, reject)=>{
    const cb = "cb_" + Math.random().toString(36).slice(2);
    params.callback = cb;

    const url = new URL(API_URL);
    Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));

    const s = document.createElement("script");
    s.src = url.toString();

    window[cb] = (data)=>{
      resolve(data);
      delete window[cb];
      s.remove();
    };

    s.onerror = ()=> reject("Network error");
    document.body.appendChild(s);
  });
}

// ---------- IST TIME ----------
function getIST(){
  const t = new Intl.DateTimeFormat("en-GB", {
    timeZone:"Asia/Kolkata",
    hour:"2-digit",
    minute:"2-digit",
    hour12:false
  }).format(new Date());

  const [h,m] = t.split(":").map(Number);
  return {h,m,text:t};
}

function isTimeValid(){
  const t = getIST();
  const now = t.h*60 + t.m;
  return now >= START_MIN && now <= END_MIN;
}

setInterval(()=>{
  document.getElementById("istNow").textContent = "IST: "+getIST().text;
},1000);

// ---------- LOCATION ----------
function distance(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dLon/2)**2;

  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ---------- SUBMIT ----------
document.getElementById("attendanceBtn").onclick = async ()=>{
  const name = nameEl.value.trim();
  const accessNo = accessEl.value.trim();
  const role = roleEl.value;
  const phone = phoneEl.value;

  const msg = document.getElementById("msg");

  if(!name || !accessNo){
    msg.textContent = "Enter Name & Access No";
    return;
  }

  // TIME CHECK
  if(!isTimeValid()){
    alert("❌ Allowed time: 10:00–10:30 AM IST");
    return;
  }

  msg.textContent = "Checking location...";

  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const dist = Math.round(distance(lat,lng,OFFICE_LAT,OFFICE_LNG));

    if(dist > ALLOWED_RADIUS_METERS){
      alert("❌ You are outside office ("+dist+"m)");
      return;
    }

    msg.textContent = "Saving...";

    const res = await jsonp({
      action:"add",
      name,
      accessNo,
      role,
      phone,
      device:"Mobile"
    });

    if(res.ok){
      msg.textContent = "✅ Attendance Saved";
      nameEl.value="";
      accessEl.value="";
      roleEl.value="";
      phoneEl.value="";
    }else{
      msg.textContent = "❌ Failed";
    }

  }, ()=>{
    alert("Enable location");
  });
};

// refs
const nameEl = document.getElementById("name");
const accessEl = document.getElementById("accessNo");
const roleEl = document.getElementById("role");
const phoneEl = document.getElementById("phone");
</script>

</body>
</html>
